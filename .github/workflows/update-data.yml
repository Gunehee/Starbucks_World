name: Update Starbucks Data

on:
  schedule:
    - cron: '0 6 * * *'   # Runs daily at 6:00 AM UTC (automatically)
  workflow_dispatch:        # Also allows manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90    # ~80 sequential Overpass calls; large countries alone can take 1-2 min each
    permissions:
      contents: write       # Required to commit the refreshed GeoJSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/starbucks_world.geojson
          git diff --staged --quiet || git commit -m "chore: auto-update worldwide Starbucks data $(date +'%Y-%m-%d')"
          git push
